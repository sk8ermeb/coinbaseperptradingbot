{% extends "base.html" %}

{% block title %}Backtesting{% endblock %}

{% block content %}
<link href="/static/bootstrap-5.3.8-dist/css/bootstrap-icons.css" rel="stylesheet">
<link href="/static/css/tempus-dominus.min.css" rel="stylesheet">


<div class="container-fluid">
  <div class="row align-items-center g-3 flex-sm-wrap">
    <div class="col-auto">
      <select class="form-select" id="scriptDropdown" onchange="onScriptChange(this)">
        {% if scripts is defined %}
          {% for script in scripts %}
            <option value="{{ script.id }}">{{ script.name }}</option>
          {% endfor %}
        {% else %}
          <option value="-1">No Scripts</option>
        {% endif %}
      </select>
    </div>

    <div class="col-auto">
      <button id="bstartsim" class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center" 
          style="width:40px; height:40px; padding:0;" onclick="runScript()">
        <i class="bi bi-play-fill display-6" style="margin-left:3px;"></i>
      </button>
    </div>

    <div class="col-auto">
      <button id="bstopsim" class="btn btn-danger rounded-circle d-flex align-items-center justify-content-center d-none"
          style="width:40px; height:40px; padding:0;" onclick="stopSim()">
        <i class="bi bi-stop-fill display-6"></i>
      </button>
    </div>
    
    <div class="col-auto">
      <div class="input-group" id="datetimepicker1">
        <input type="text" class="form-control" placeholder="Click the calendar">
        <span class="input-group-text">
          <i class="bi bi-calendar"></i>
        </span>
      </div>
    </div>
    <div class="col-auto">
      <p> to </p>
    </div>
    <div class="col-auto">
      <div class="input-group" id="datetimepicker2">
        <input type="text" class="form-control" placeholder="Click the calendar">
        <span class="input-group-text">
          <i class="bi bi-calendar"></i>
        </span>
      </div>
    </div>
    <div class="col-auto">
      <select class="form-select" id="historyDropdown" onchange="onHistoryChange(this)">
        <option value="-1">History</option>
      </select>
    </div>
    <div class="col-auto d-none" id="simProgressContainer" style="min-width: 200px;">
      <div class="progress" style="height: 22px; border-radius: 6px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
             role="progressbar"
             id="simProgressBar"
             style="width: 0%; font-size: 0.8rem; font-weight: 600;">0%</div>
      </div>
    </div>
  </div>
</div>


<ul class="nav nav-tabs" id="myTab" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#charttab">Chart</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#statstab">Data</button>
  </li>
</ul>

<div class="tab-content">
  <div class="tab-pane active" id="charttab">
    <div class="d-flex gap-3 align-items-center px-3 pt-2">
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="chkUser" onchange="onEventFilterChange()" checked>
        <label class="form-check-label" for="chkUser">User</label>
      </div>
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="chkCreate" onchange="onEventFilterChange()" checked>
        <label class="form-check-label" for="chkCreate">Create</label>
      </div>
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="chkFill" onchange="onEventFilterChange()" checked>
        <label class="form-check-label" for="chkFill">Fill</label>
      </div>
      <div class="form-check form-check-inline mb-0">
        <input class="form-check-input" type="checkbox" id="chkCancel" onchange="onEventFilterChange()" checked>
        <label class="form-check-label" for="chkCancel">Cancel</label>
      </div>
    </div>
    <div class="container-fluid" style="overflow: hidden;">
      <div class="d-flex flex-column flex-md-row flex-nowrap">
        <div class="flex-grow-1 order-md-1" style="min-width: 0;">
          <div id="chart" class="shadow-sm border border-7 border-secondary rounded-4 p-2 m-3"
             style="height: calc(100vh - 200px); background:#1a1a1a;">
          </div>
        </div>
        <div class="flex-md-shrink-0 order-md-2" style="width: 300px;">
          <div id="indicator-legend" style="padding:8px 12px 4px;display:flex;flex-wrap:wrap;gap:6px;"></div>
          <div id="eventsout">Events Text</div>
        </div>
      </div>
    </div>
  </div>
  <div class="tab-pane" id="statstab">
    <div class="d-flex gap-0" style="height: calc(100vh - 160px);">
      <div class="flex-grow-1 p-3" style="overflow-y: auto; border-right: 1px solid #dee2e6;">
        <p id="simlog"></p>
      </div>
      <div class="p-3" style="width: 300px; flex-shrink: 0; overflow-y: auto;">
        <h6 class="mb-3">Sim Stats</h6>
        <div id="simstats"><i class="text-muted">Run a simulation to see stats.</i></div>
      </div>
    </div>
  </div>
</div>
<div id="dt1hid" data-hidden="{{ simstart }}"></div>
<div id="dt2hid" data-hidden="{{ simstop }}"></div>
<script>
  document.body.style.overflowY = 'scroll';
</script>
<script src="/static/js/lightweight-charts.standalone.production.js"></script>
<script src="/static/js/popper.min.js"></script>
<script src="/static/js/tempus-dominus.min.js"></script>
<script src="/static/js/backtest.js"></script>
{% endblock %}
