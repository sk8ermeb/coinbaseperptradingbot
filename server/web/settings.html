{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="border border-3 border-primary rounded-4 shadow-lg p-3 m-3 bg-white">
  <label for="cbkey" class="form-label">Coinbase Key</label>
  <input type="password" class="form-control" id="cbkey"
         placeholder="Enter Coinbase Key"
         data-configured="{{ 'true' if cbkey_set else 'false' }}"
         required>
  <button type="button"
          class="btn btn-primary mt-3"
          onclick="saveCredential('cbkey')">
    Save
  </button>
</div>
<div class="border border-3 border-primary rounded-4 shadow-lg p-3 m-3 bg-white">
  <label for="cbsecret" class="form-label">Coinbase Secret</label>
  <input type="password" class="form-control" id="cbsecret"
         placeholder="Enter Coinbase Secret"
         data-configured="{{ 'true' if cbsecret_set else 'false' }}"
         required>
  <button type="button"
          class="btn btn-primary mt-3"
          onclick="saveCredential('cbsecret')">
    Save
  </button>
</div>

<div class="border border-3 border-primary rounded-4 shadow-lg p-3 m-3 bg-white">
  <h5 class="mb-3">Ntfy Notifications</h5>
  <div class="d-flex flex-wrap gap-4 align-items-start">
    <div id="ntfyqr"></div>
    <div class="d-flex flex-column gap-3" style="min-width:260px">
      <div>
        <label class="form-label mb-1 small text-muted">
          Server: <code>ntfy.sh</code> &nbsp;|&nbsp; Topic:
        </label>
        <div class="input-group input-group-sm">
          <input type="text" class="form-control font-monospace"
                 id="ntfyuuid" readonly onclick="this.select()">
          <button class="btn btn-outline-secondary" type="button" onclick="copyNtfyTopic()">Copy</button>
        </div>
        <small class="text-muted">In ntfy: tap <strong>+</strong> → enter server <code>ntfy.sh</code> and paste topic</small>
      </div>
      <div>
        <div class="fw-semibold mb-2 small">Send notification on:</div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="ntfy_create" onchange="saveNtfyPrefs()">
          <label class="form-check-label" for="ntfy_create">Create</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="ntfy_fill" onchange="saveNtfyPrefs()">
          <label class="form-check-label" for="ntfy_fill">Fill</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="ntfy_cancel" onchange="saveNtfyPrefs()">
          <label class="form-check-label" for="ntfy_cancel">Cancel</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="ntfy_user" onchange="saveNtfyPrefs()">
          <label class="form-check-label" for="ntfy_user">User</label>
        </div>
      </div>
      <button class="btn btn-outline-primary btn-sm" onclick="testNtfy()">
        Test Notification
      </button>
    </div>
  </div>
</div>

<script src="/static/js/qrcode.js"></script>
<script src="/static/js/settings.js"></script>
{% endblock %}
